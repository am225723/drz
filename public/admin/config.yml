backend:
  name: github
  repo: am225723/drz
  branch: main
  auth_scope: repo

media_folder: public/uploads
public_folder: /uploads

site_url: https://drzelisko.com
display_url: https://drzelisko.com
logo_url: /logo.png

collections:
  - name: pages
    label: Pages
    files:
      - name: homepage
        label: Homepage
        file: content/homepage.json
        fields:
          - { label: Hero Eyebrow, name: heroEyebrow, widget: string, default: Board-certified psychiatry in Connecticut }
          - { label: Hero Title, name: heroTitle, widget: string, default: Holistic psychiatry rooted in you. }
          - { label: Hero Body, name: heroBody, widget: text }
          - { label: Practice Section Title, name: practiceTitle, widget: string, default: A wider lens for mental health. }
          - { label: Practice Section Body, name: practiceBody, widget: markdown }
      - name: about
        label: About Dr. Z
        file: content/about.json
        fields:
          - { label: Page Title, name: title, widget: string, default: Your partner in healing. }
          - { label: Subtitle, name: subtitle, widget: text }
          - { label: Bio, name: bio, widget: markdown }
          - label: Training
            name: training
            widget: list
            field: { label: Item, name: item, widget: string }
      - name: services
        label: Services
        file: content/services.json
        fields:
          - label: Services
            name: services
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: text, widget: text }
      - name: resources
        label: Resources & FAQ
        file: content/resources.json
        fields:
          - label: Articles
            name: articles
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Category, name: category, widget: string }
              - { label: Summary, name: text, widget: text }
              - label: Sections
                name: sections
                widget: list
                fields:
                  - { label: Heading, name: heading, widget: string }
                  - { label: Body, name: body, widget: text }
              - label: Takeaways
                name: takeaways
                widget: list
                field: { label: Takeaway, name: takeaway, widget: string }
          - label: FAQ Groups
            name: faqGroups
            widget: list
            fields:
              - { label: Group Title, name: title, widget: string }
              - label: Questions
                name: items
                widget: list
                fields:
                  - { label: Question, name: question, widget: string }
                  - { label: Answer, name: answer, widget: text }
  - name: settings
    label: Site Settings
    files:
      - name: practice
        label: Practice Info
        file: content/practice.json
        fields:
          - { label: Practice Name, name: name, widget: string }
          - { label: Doctor Name, name: doctor, widget: string }
          - { label: Address, name: address, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Patient Portal URL, name: portalUrl, widget: string }
